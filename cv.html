<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Curriculum Vitae | Partha Pratim Ray</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    :root {
      --primary: #17324d;
      --primary-light: #24527a;
      --accent: #0b6bcb;
      --accent-soft: #e8f2ff;
      --gold: #b7791f;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #5f6b7a;
      --border: #d9e2ec;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef4fb 0%, #f8fafc 45%, #ffffff 100%);
      color: var(--text);
      line-height: 1.7;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      word-break: break-word;
      font-weight: 700;
    }

    a:hover {
      color: var(--primary-light);
      text-decoration: underline;
    }

    .container {
      width: min(1180px, 92%);
      margin: 0 auto;
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #ffffff;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 14px 0;
    }

    nav a {
      color: #ffffff;
      font-size: 0.93rem;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 999px;
      transition: all 0.25s ease;
    }

    nav a:hover {
      background: rgba(255, 255, 255, 0.16);
      color: #ffffff;
      text-decoration: none;
    }

    .page-header {
      margin: 42px 0 26px;
      padding: 34px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .page-header h1 {
      margin: 0 0 10px;
      color: var(--primary);
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .page-header p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px;
      margin: 30px 0 44px;
      box-shadow: var(--shadow);
    }

    .section h2 {
      margin: 0 0 24px;
      color: var(--primary);
      font-size: 1.8rem;
      border-bottom: 3px solid var(--accent-soft);
      padding-bottom: 10px;
    }

    .cv-frame {
      width: 100%;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
      background: #ffffff;
    }

    .cv-frame iframe {
      display: block;
      width: 100%;
      height: 900px;
      border: none;
      background: #ffffff;
    }

    .download-box {
      margin-top: 18px;
      padding: 16px 18px;
      background: var(--accent-soft);
      border: 1px solid var(--border);
      border-left: 5px solid var(--accent);
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
    }

    .download-box a {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: #ffffff;
      font-weight: 700;
      transition: all 0.25s ease;
    }

    .download-box a:hover {
      background: var(--accent);
      color: #ffffff;
      text-decoration: none;
      transform: translateY(-1px);
    }

    footer {
      margin-top: 46px;
      padding: 28px 16px;
      text-align: center;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #ffffff;
      font-size: 0.95rem;
    }

    @media (max-width: 860px) {
      nav {
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
        padding: 12px 0;
      }

      nav a {
        white-space: nowrap;
      }

      .page-header,
      .section {
        padding: 24px 20px;
      }

      .cv-frame iframe {
        height: 760px;
      }
    }

    @media (max-width: 520px) {
      .container {
        width: 94%;
      }

      .page-header {
        margin-top: 24px;
      }

      .page-header h1 {
        font-size: 2rem;
      }

      .section h2 {
        font-size: 1.5rem;
      }

      .cv-frame iframe {
        height: 620px;
      }

      .download-box {
        padding: 14px 15px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="container">
    <nav>
      <a href="index.html">Home</a>
      <a href="education.html">Education</a>
      <a href="publications.html">Publications</a>
      <a href="books.html">Books</a>
      <a href="teaching.html">Teaching</a>
      <a href="mentorship.html">Mentorship</a>
      <a href="service.html">Service</a>
      <a href="membership.html">Memberships</a>
      <a href="talks.html">Talks</a>
      <a href="projects.html">Projects</a>
      <a href="awards.html">Awards</a>
      <a href="media.html">Media</a>
      <a href="cv.html">CV</a>      
    </nav>
  </div>
</header>

<div class="container">

  <div class="page-header">
    <h1>Curriculum Vitae</h1>
    <p>Complete academic and professional curriculum vitae</p>
  </div>

  <div class="section">
    <h2>Curriculum Vitae</h2>

    <div class="cv-frame">
      <iframe
        src="assets/ParthaPratimRay_CV_Latex.pdf">
      </iframe>
    </div>

    <p class="download-box">
      <a href="assets/ParthaPratimRay_CV_Latex.pdf" target="_blank">
        Download CV (PDF)
      </a>
    </p>
  </div>

</div>

<footer>
  © Partha Pratim Ray
</footer>

</body>
</html>
